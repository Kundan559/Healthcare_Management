<html>
<head>
    <title>Password Reset</title>
</head>
<body>
    <h2> Password Reset </h2>
    <form method = "POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type = "submit">
            Reset Password
        </button>
    
    </form>
<p>
    Remembered your password?
    <a href="{% url 'login' %}">
        Login here
    </a>
</p>
</body>
</html>
