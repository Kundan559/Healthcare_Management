{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="col-md-5">

        <div class="card shadow p-5">

            <h2 class="text-center mb-4">
                Login
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    {{ form.password }}
                </div>

                <button
                    type="submit"
                    class="btn btn-primary w-100">

                    Login

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
